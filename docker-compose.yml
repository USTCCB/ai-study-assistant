version: "3.8"
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_study
    ports: ["5432:5432"]
  app:
    build: .
    depends_on: [db]
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/ai_study
    env_file: .env
    ports: ["8000:8000"]
