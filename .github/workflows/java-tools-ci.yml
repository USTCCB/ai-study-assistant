name: Java Tools CI

on:
  push:
    branches: [main]
    paths: ['java-tools/**']
  pull_request:
    branches: [main]
    paths: ['java-tools/**']

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: java-tools
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('java-tools/pom.xml') }}
      - run: mvn -B clean verify
      - uses: actions/upload-artifact@v4
        with:
          name: ai-study-java-tools
          path: java-tools/target/*.jar
